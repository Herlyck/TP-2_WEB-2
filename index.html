<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>**ElectroTienda**</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="estilo.css">
</head>

<body class="bg-dark text-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary fs-3" href="#">ElectroTienda</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link active fw-medium" aria-current="page" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-medium" href="#" data-bs-toggle="modal"
                            data-bs-target="#modalFormulario">Carga de Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-medium" href="ofertas.html">Ofertas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-medium" href="contacto.html">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="carouselExampleAutoplaying" class="carousel slide my-4" data-bs-ride="carousel">
        <div class="carousel-inner" id="contenedorBanners"></div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Siguiente</span>
        </button>
    </div>

    <main class="container my-5">
        <div class="row mb-4 justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-black border-secondary text-primary">🔍</span>
                    <input type="text" id="buscadorProductos" class="form-control bg-dark text-white border-secondary"
                        placeholder="Buscar productos por nombre...">
                </div>
            </div>
        </div>

        <div class="productos row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="app.js"></script>

    <div class="modal fade" id="modalFormulario" tabindex="-1" aria-labelledby="modalFormularioLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-black border border-secondary text-white rounded-3 shadow-lg">

                <div class="modal-header border-bottom border-secondary">
                    <h5 class="modal-title fw-bold text-primary" id="modalFormularioLabel">📦 Panel de Carga de
                        Productos</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body p-0" style="height: 75vh; overflow-y: auto;">
                    <iframe
                        src="https://docs.google.com/forms/d/e/1FAIpQLSfYLaVj8OWJcZ4S-489C7Ijlpb0XvpNC0XSKMQ_DnQaCjeXjQ/viewform?embedded=true"
                        width="100%" height="100%" frameborder="0" marginheight="0" marginwidth="0">
                        Cargando formulario...
                    </iframe>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCompraExito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-black border border-success text-white rounded-3 shadow-lg p-3">

                <div class="modal-body text-center">
                    <div class="display-1 text-success mb-3">🛒</div>

                    <h3 class="fw-bold text-success mb-2">¡Producto Seleccionado!</h3>
                    <p class="text-white-50">Agregaste con éxito el siguiente artículo:</p>

                    <div class="bg-dark p-3 rounded-3 border border-secondary mb-4 text-start">
                        <h6 id="modalCompraNombre" class="fw-semibold text-white mb-2">Nombre del producto</h6>
                        <p id="modalCompraPrecio" class="fs-4 fw-bold text-success mb-0">$0</p>
                    </div>

                    <p class="small text-white mb-4">
                        📍 Recordá que podés retirarlo por nuestro local en <strong>La Tablada</strong> o coordinar el
                        envío.
                    </p>

                    <button type="button" class="btn btn-success w-100 fw-bold py-2" data-bs-dismiss="modal">
                        Seguir mirando productos
                    </button>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
