<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - ElectroTienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="contacto.css">
</head>

<body class="bg-dark text-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">ElectroTienda</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link fw-medium" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-medium" href="#" data-bs-toggle="modal"
                            data-bs-target="#modalFormulario">Carga de Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="ofertas.html">Ofertas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-medium" href="contacto.html">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container seccion-contacto-wrapper">

        <div class="card card-contacto shadow border-secondary text-white">
            <div class="card-body p-4 text-center">
                <h2 class="card-title text-primary fw-bold mb-4">📍 Nuestro Contacto</h2>
                <hr class="border-secondary mb-4">

                <div class="mb-4 d-flex align-items-center justify-content-center gap-3 info-item text-start">
                    <span class="fs-4">🏠</span>
                    <div class="w-100">
                        <p class="text-muted small mb-0">Ubicación</p>
                        <p class="fw-medium mb-0">La Tablada, Buenos Aires</p>
                    </div>
                </div>

                <div class="mb-4 d-flex align-items-center justify-content-center gap-3 info-item text-start">
                    <span class="fs-4">📞</span>
                    <div class="w-100">
                        <p class="text-muted small mb-0">Teléfono de atención</p>
                        <p class="fw-medium mb-0">11 5475-8824</p>
                    </div>
                </div>

                <div class="mb-5 d-flex align-items-center justify-content-center gap-3 info-item text-start">
                    <span class="fs-4">⏰</span>
                    <div class="w-100">
                        <p class="text-muted small mb-0">Horarios de Atención</p>
                        <p class="fw-medium mb-0">Lunes a Viernes de 09:00 a 18:00 hs</p>
                    </div>
                </div>

                <a href="index.html" class="btn btn-outline-primary w-100 fw-medium py-2">Volver al Inicio</a>
            </div>
        </div>

    </main>


    <div class="modal fade" id="modalFormulario" tabindex="-1" aria-labelledby="modalFormularioLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-black border border-secondary text-white rounded-3 shadow-lg">

                <div class="modal-header border-bottom border-secondary">
                    <h5 class="modal-title fw-bold text-primary" id="modalFormularioLabel">📦 Panel de Carga de
                        Productos</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body p-0" style="height: 75vh; overflow-y: auto;">
                    <iframe
                        src="https://docs.google.com/forms/d/e/1FAIpQLSfYLaVj8OWJcZ4S-489C7Ijlpb0XvpNC0XSKMQ_DnQaCjeXjQ/viewform?embedded=true"
                        width="100%" height="100%" frameborder="0" marginheight="0" marginwidth="0">
                        Cargando formulario...
                    </iframe>
                </div>

            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
